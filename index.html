<!DOCTYPE html>
<html>

  <head>
      <title>Lim - Spostati quando vuoi</title>

      <link rel="stylesheet" href="style.css">

      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">
  </head>

  <body>

      <div id="main-container">
          <div id="second-container">

              <!-- Logo e titolo -->
              <header>
                  <img src="img/logo.png">
                  <h1>Taking booleaners from A to B</h1>
              </header>

              <!-- Navbar -->
              <nav>
                  <div class="nav-button">
                      <a href="#"><button type="button">Prenota</button></a>
                      <a href="#"><button type="button">Termina Prenotazione</button></a>
                      <a href="#"><button type="button">Accendi Luci</button></a>
                  </div>
              </nav>

              <!-- Elenco monopattini prenotabili -->
              <main>

                  <div class="show-monopattino">
                      <input type="checkbox"><span class="name-monopattino">Monopattino Gino22</span>
                      <div class="position-monopattino">&#8594; <span>Via Guadalamentri - a 220 metri da te</span></div>

                      <!-- Stato carica -->
                      <div class="charge-text">Stato carica:</div>
                      <div class="charge-monopattino-first"></div>
                  </div>

                  <div class="show-monopattino">
                      <input type="checkbox"><span class="name-monopattino">Monopattino Mike24</span>
                      <div class="position-monopattino">&#8594; <span>Via Ricciardoni - a 420 metri da te</span></div>

                      <!-- Stato carica -->
                      <div class="charge-text">Stato carica:</div>
                      <div class="charge-monopattino-second"></div>
                  </div>

                  <div class="show-monopattino">
                      <input type="checkbox"><span class="name-monopattino">Monopattino Fede154</span>
                      <div class="position-monopattino">&#8594; <span>Via Mentarini - a 490 metri da te</span></div>

                      <!-- Stato carica -->
                      <div class="charge-text">Stato carica:</div>
                      <div class="charge-monopattino-third"></div>
                  </div>

              </main>
          </div>
      </div>

  </body>

</html>
